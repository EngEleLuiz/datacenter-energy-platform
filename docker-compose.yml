version: "3.9"

# =============================================================================
# Datacenter Energy Intelligence Platform — Local Development Stack
# Mirrors: Kafka=Kinesis | MinIO=S3 | DuckDB=Athena | PostgreSQL=RDS
# =============================================================================

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1-python3.11
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:admin123@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: "Zt_example_fernet_key_replace_in_prod_32bX="
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: "datacenter_secret_key"
    AIRFLOW__LOGGING__LOGGING_LEVEL: WARNING
    AWS_ACCESS_KEY_ID: minioadmin
    AWS_SECRET_ACCESS_KEY: minioadmin
    AWS_DEFAULT_REGION: us-east-1
    MLFLOW_TRACKING_URI: http://mlflow:5000
  volumes:
    - ./airflow_dags:/opt/airflow/dags
    - ./ml:/opt/airflow/ml
    - airflow_logs:/opt/airflow/logs
    - airflow_plugins:/opt/airflow/plugins
  depends_on:
    postgres:
      condition: service_healthy

services:

  postgres:
    image: postgres:16-alpine
    container_name: dc_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sh:/docker-entrypoint-initdb.d/init.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: dc_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: dc_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/datacenter-bronze;
        mc mb --ignore-existing local/datacenter-silver;
        mc mb --ignore-existing local/datacenter-gold;
        mc mb --ignore-existing local/mlflow-artifacts;
        echo 'Buckets created successfully';
      "
  # ---------------------------------------------------------------------------
  # Kafka + Zookeeper — streaming ingestion (mirrors AWS Kinesis)
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: dc_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: dc_kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    ports:
      - "29092:29092"
    volumes:
      - kafka_data:/var/lib/kafka/data
  # Kafka UI — manage topics and messages visually
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: dc_kafka_ui
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8090:8080"
  # ---------------------------------------------------------------------------
  # MLflow — experiment tracking (mirrors AWS SageMaker experiments)
  # ---------------------------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: dc_mlflow
    command: >
      mlflow server
        --backend-store-uri /mlflow/tracking
        --artifacts-destination /mlflow/artifacts
        --host 0.0.0.0
        --port 5000
    volumes:
      - mlflow_data:/mlflow
    ports:
      - "5000:5000"
  # ---------------------------------------------------------------------------
  # Apache Airflow — pipeline orchestration (mirrors AWS MWAA)
  # ---------------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: dc_airflow_init
    command: ["bash", "-c", "airflow db migrate && airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@datacenter.local --password admin123"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    container_name: dc_airflow_webserver
    command: webserver
    ports:
      - "8081:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: dc_airflow_scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped
  # ---------------------------------------------------------------------------
  # Grafana — real-time monitoring dashboard (mirrors AWS CloudWatch)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.0
    container_name: dc_grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"

  # ---------------------------------------------------------------------------
  # Streamlit — ML dashboard & serving layer
  # ---------------------------------------------------------------------------
  streamlit:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.streamlit
    container_name: dc_streamlit
    volumes:
      - .:/app
    working_dir: /app/dashboard
    environment:
      PYTHONPATH: /app
      MINIO_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      POSTGRES_DSN: postgresql://admin:admin123@postgres:5432/datacenter_gold
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8501:8501"
    depends_on:
      - postgres
      - mlflow

volumes:
  postgres_data:
  minio_data:
  kafka_data:
  zookeeper_data:
  airflow_logs:
  airflow_plugins:
  grafana_data:
  mlflow_data: